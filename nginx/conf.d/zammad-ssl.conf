server {
    listen 80;
    server_name zd.ironrising.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name zd.ironrising.com;

    # Let's Encrypt certificates
    ssl_certificate /etc/letsencrypt/live/zd.ironrising.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zd.ironrising.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /opt/zammad/public;

    access_log /var/log/nginx/zammad.access.log;
    error_log /var/log/nginx/zammad.error.log;

    location / {
        try_files $uri/index.html $uri @zammad;
    }

    location @zammad {
        proxy_pass http://zammad-railsserver:3000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }
}
